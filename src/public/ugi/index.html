<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGI Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="hdr">
    <h1>UGI</h1><div class="sep"></div>
    <button class="bt on" data-v="lb">Leaderboard</button>
    <button class="bt" data-v="agg">Aggregate</button>
    <button class="bt" data-v="info">Chart</button>
    <div class="sep"></div>
    <input id="search" type="text" placeholder="Filter…">
    <div class="sep"></div>
    <div style="position:relative" id="cwrap"><button class="bt" id="cbt">Cols</button><div id="cpick" class="hid"></div></div>
    <span id="status"></span>
  </header>

  <div id="layout">
    <aside id="sidebar"></aside>
    <div id="main">

      <div id="v-lb" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div style="flex:1;overflow:auto">
          <table><thead id="lth"></thead><tbody id="ltb"></tbody></table>
        </div>
      </div>

      <div id="v-agg" class="hid" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div id="agg-bar">
          <label>Group by
            <select id="agrp">
              <option value="architecture">Architecture</option>
              <option value="paramSize">Params (Active)</option>
              <option value="totalParamSize">Params (Total)</option>
              <option value="type">Type</option>
              <option value="template">Template</option>
              <option value="originality">Originality</option>
            </select>
          </label>
        </div>
        <div style="flex:1;overflow:auto">
          <table><thead id="ath"></thead><tbody id="atb"></tbody></table>
        </div>
      </div>

      <div id="v-info" class="hid" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <p style="color:var(--t2)">Info page — coming soon.</p>
      </div>

    </div>
    <aside id="det-panel" class="hid"></aside>
  </div>
</div>

<div id="thpop" class="hide"></div>

<div id="cmdp">
  <div id="cmdp-box">
    <input id="cmdp-in" placeholder="Toggle columns…">
    <div id="cmdp-ls"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="leaderboard.js"></script>
<script src="aggregation.js"></script>
<script src="ui.js"></script>
</body>
</html>
