<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Online Hours</title>
  <style>
    :root{
      --bg:#200b0b;
      --text:#ffffff;
      --muted:#bbbbbb;
      --line:rgba(148, 184, 153, 0.18);
      --on:#56a347;
      --off:#363636;
      --head:#333333;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#000;
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:16px;
    }

    .card{
      background:rgba(0, 0, 0, 0.92);
      border:1px solid var(--line);
      border-radius:4px;
      padding:14px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:1px solid var(--line);
      background:#0f172a;
      color:var(--text);
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
    }

    button.active{
      background:#58d158;
      border-color:#41cc54;
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    #meta{
      color:var(--muted);
      font-size:12px;
      margin-bottom:12px;
      min-height:18px;
    }

    .scroll{
      overflow-x:auto;
    }

    #grid{
      display:grid;
      gap:3px;
      min-width:980px;
    }

    .hourHeader{
      display:grid;
      grid-template-columns:84px repeat(24, minmax(10px, 1fr));
      gap:3px;
      align-items:center;
      margin-bottom:4px;
    }

    .hourHeader .spacer{
      min-height:1px;
    }

    .hour{
      font-size:11px;
      color:var(--muted);
      text-align:center;
      white-space:nowrap;
      padding:4px 0;
      /*background:rgba(31,41,55,.5);*/
      border-radius:4px;
    }

    .day{
      display:grid;
      grid-template-columns:84px repeat(24, minmax(10px, 1fr));
      gap:3px;
      align-items:center;
    }

    .label{
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .cell{
      aspect-ratio:1/1;
      border-radius:3px;
      background:var(--off);
    }

    .cell.on{
      background:var(--on);
    }

    @media (max-width: 900px){
      .hourHeader,
      .day{
        grid-template-columns:64px repeat(24, minmax(8px, 1fr));
        gap:2px;
      }
      .label,
      .hour{
        font-size:10px;
      }
      #grid{
        min-width:860px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div id="meta"></div>
        <div></div>
        <div class="row">
          <button id="weeklyBtn" class="active">Weekly</button>
          <button id="monthlyBtn">Monthly</button>
        </div>
      </div>

      <div class="scroll">
        <div id="grid"></div>
      </div>
    </div>
  </div>

  <script>
    const meta = document.getElementById('meta');
    const grid = document.getElementById('grid');
    const weeklyBtn = document.getElementById('weeklyBtn');
    const monthlyBtn = document.getElementById('monthlyBtn');

    const cache = {
      weekly: null,
      monthly: null
    };

    let currentKey = 'weekly';
    let loading = false;

    const hourFormatter = new Intl.DateTimeFormat(undefined, {
      hour: 'numeric',
      hour12: true
    });

    const dateFormatter = new Intl.DateTimeFormat(undefined, {
      weekday: 'short',
      month: 'short',
      day: 'numeric'
    });

    function decodeBits(b64, total) {
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const bits = [];
      for (const b of bytes) {
        for (let i = 0; i < 8 && bits.length < total; i++) {
          bits.push((b >> i) & 1);
        }
      }
      while (bits.length < total) bits.push(0);
      return bits;
    }

    function localDayKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function localHourIndex(d) {
      return d.getHours();
    }

    function hourLabel(hour) {
      const base = new Date(2000, 0, 1, hour, 0, 0, 0);
      return hourFormatter.format(base).toLowerCase();
    }

    async function loadPayload(key) {
      if (cache[key]) return cache[key];

      const res = await fetch(`/api/status/${key}`, {
        headers: { 'accept': 'application/json' }
      });

      if (!res.ok) {
        throw new Error(`Failed to load ${key}: ${res.status} ${res.statusText}`);
      }

      const json = await res.json();
      cache[key] = json;
      return json;
    }

    function setButtonsActive() {
      weeklyBtn.classList.toggle('active', currentKey === 'weekly');
      monthlyBtn.classList.toggle('active', currentKey === 'monthly');
      weeklyBtn.disabled = loading;
      monthlyBtn.disabled = loading;
    }

    function buildHeader() {
      const header = document.createElement('div');
      header.className = 'hourHeader';

      const spacer = document.createElement('div');
      spacer.className = 'spacer';
      header.appendChild(spacer);

      for (let h = 0; h < 24; h++) {
        const cell = document.createElement('div');
        cell.className = 'hour';
        cell.textContent = hourLabel(h);
        cell.title = `Hour ${h}`;
        header.appendChild(cell);
      }

      return header;
    }

    function renderGrid(payload) {
      const bits = decodeBits(payload.data, payload.totalHours);
      const start = new Date(payload.startDate);
      const end = new Date(start.getTime() + (payload.totalHours - 1) * 3600000);

      const dayMap = new Map();

      for (let i = 0; i < payload.totalHours; i++) {
        const ts = start.getTime() + i * 3600000;
        const d = new Date(ts);
        const key = localDayKey(d);
        if (!dayMap.has(key)) {
          dayMap.set(key, {
            date: new Date(d.getFullYear(), d.getMonth(), d.getDate()),
            hours: new Array(24).fill(0)
          });
        }
        dayMap.get(key).hours[localHourIndex(d)] = bits[i];
      }

      grid.innerHTML = '';
      grid.appendChild(buildHeader());

      for (const { date, hours } of dayMap.values()) {
        const row = document.createElement('div');
        row.className = 'day';

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = dateFormatter.format(date);
        label.title = date.toLocaleDateString([], { dateStyle: 'full' });
        row.appendChild(label);

        for (let h = 0; h < 24; h++) {
          const cell = document.createElement('div');
          cell.className = 'cell' + (hours[h] ? ' on' : '');
          cell.title = `${label.textContent} ${hourLabel(h)}`;
          row.appendChild(cell);
        }

        grid.appendChild(row);
      }

      meta.textContent = `${start.toLocaleString()} → ${end.toLocaleString()} · ${payload.totalHours} hours · local time`;
    }

    async function render() {
      loading = true;
      setButtonsActive();
      meta.textContent = 'Loading...';
      grid.innerHTML = '';

      try {
        const payload = await loadPayload(currentKey);
        renderGrid(payload);
      } catch (err) {
        meta.textContent = `Error: ${err.message}`;
      } finally {
        loading = false;
        setButtonsActive();
      }
    }

    weeklyBtn.onclick = () => {
      currentKey = 'weekly';
      render();
    };

    monthlyBtn.onclick = () => {
      currentKey = 'monthly';
      render();
    };

    render();
  </script>
</body>
</html>
